# Render Blueprint — deploys the Express API as a web service.
# Import this repo at https://render.com → New → Blueprint.
services:
  - type: web
    name: mechanic-booking-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "24.13.1"
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret automatically
      - key: CORS_ORIGIN
        sync: false # set this to your Vercel URL after the frontend is deployed
